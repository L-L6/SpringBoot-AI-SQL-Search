spring.application.name=springboot

#web
server.port=8088


spring.datasource.url=jdbc:mysql://localhost:3306/your_database?serverTimezone=UTC

spring.datasource.username=
spring.datasource.password=


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.show-sql=true


spring.jpa.properties.hibernate.format_sql=true


spring.jpa.hibernate.ddl-auto=update


spring.aop.proxy-target-class=true


# logging.level.org.springframework.aop=DEBUG


logging.level.com.example.springboot.aspect.PerformanceAspect=INFO

alibaba.dashscope.api-key=${ALIBABA_API_KEY:your-api-key-here}
alibaba.dashscope.model=qwen3.5-35b-a3b

alibaba.dashscope.timeout=30000
alibaba.dashscope.max-retries=3

ai.default-table=user
